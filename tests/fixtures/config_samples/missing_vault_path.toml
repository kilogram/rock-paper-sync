# Config with vault missing required 'path' field
[paths]
state_database = "/tmp/test_state.db"

[[vaults]]
name = "test-vault"
# path is missing
remarkable_folder = "Test"
include_patterns = ["**/*.md"]
exclude_patterns = []

[cloud]
base_url = "http://localhost:3000"

[layout]
margin_top = 50
margin_bottom = 50
margin_left = 50
margin_right = 50

[logging]
level = "info"
file = "/tmp/test.log"
