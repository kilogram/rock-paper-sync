[paths]
obsidian_vault = "~/obsidian-vault"
# Missing remarkable_output
state_database = "~/.local/share/rm-obsidian-sync/state.db"

[sync]
include_patterns = ["**/*.md"]
exclude_patterns = []
debounce_seconds = 5

[layout]
lines_per_page = 45
margin_top = 50
margin_bottom = 50
margin_left = 50
margin_right = 50

[logging]
level = "info"
file = "~/.local/share/rm-obsidian-sync/sync.log"
