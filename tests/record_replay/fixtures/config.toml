# Test fixture configuration for record/replay tests
#
# This config is copied to the workspace directory during test setup.
# Environment variables are used for dynamic values:
#
# Set by conftest.py:
# - RPS_TEST_WORKSPACE: absolute path to workspace directory
# - RPS_CLOUD_BASE_URL: cloud base URL (from user's actual config for online tests,
#                       or localhost:3001 for offline tests)

[cloud]
base_url = "$RPS_CLOUD_BASE_URL"

[paths]
state_database = "$RPS_TEST_WORKSPACE/.state/state.db"
cache_dir = "$RPS_TEST_WORKSPACE/.cache"

[logging]
level = "debug"
file = "$RPS_TEST_WORKSPACE/logs/sync.log"

[layout]
lines_per_page = 28
margin_top = 50
margin_bottom = 50
margin_left = 50
margin_right = 50
allow_paragraph_splitting = false

[sync]
debounce_seconds = 5

[ocr]
enabled = false
provider = "none"
confidence_threshold = 0.5

# Test vault pointing to the workspace directory
# Note: vault name must be 'device-bench' to match WorkspaceManager expectations
# Uses environment variable for dynamic path
[[vaults]]
name = "device-bench"
path = "$RPS_TEST_WORKSPACE"
remarkable_folder = "TestRecording"
include_patterns = ["**/*.md"]
exclude_patterns = [".state/**", "logs/**", ".cache/**", "config.toml"]
