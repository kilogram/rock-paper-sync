# Test fixture configuration for record/replay tests
#
# This config uses Python format() placeholders for dynamic values.
# Placeholders are expanded by conftest.py before writing to workspace.
#
# Required placeholders (set by conftest.py):
#   {workspace}  - absolute path to workspace directory
#   {cloud_url}  - cloud base URL
#
# Optional placeholders (with defaults):
#   {allow_paragraph_splitting} - allow paragraph splitting (default: false)

[cloud]
base_url = "{cloud_url}"

[paths]
state_database = "{workspace}/.state/state.db"
cache_dir = "{workspace}/.cache"

[logging]
level = "debug"
file = "{workspace}/logs/sync.log"

[layout]
# Lines per page is calculated automatically from device geometry
margin_top = 50
margin_bottom = 50
margin_left = 50
margin_right = 50
allow_paragraph_splitting = {allow_paragraph_splitting}

[sync]
debounce_seconds = 5

[ocr]
enabled = false
provider = "none"
confidence_threshold = 0.5

# Test vault pointing to the workspace directory
# Note: vault name must be 'device-bench' to match WorkspaceManager expectations
[[vaults]]
name = "device-bench"
path = "{workspace}"
remarkable_folder = "TestRecording"
include_patterns = ["**/*.md"]
exclude_patterns = [".state/**", "logs/**", ".cache/**", "config.toml"]
