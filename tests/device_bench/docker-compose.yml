services:
  rmfakecloud:
    image: docker.io/ddvk/rmfakecloud:latest
    ports:
      - "3001:3000"  # Use different port than real rmfakecloud
    environment:
      - STORAGE_URL=http://localhost:3001
      - JWT_SECRET_KEY=test-secret-key
      - LOGLEVEL=debug
    volumes:
      # Persist rmfakecloud data (users, devices, documents) across container restarts
      # This directory can be committed to git for team-wide setup
      - ./fixtures/rmfakecloud_data:/data
    network_mode: "slirp4netns:port_handler=slirp4netns"
