services:
  rmfakecloud:
    image: docker.io/ddvk/rmfakecloud:latest
    ports:
      - "3001:3000"  # Use different port than real rmfakecloud
    environment:
      - STORAGE_URL=http://localhost:3001
      - JWT_SECRET_KEY=test-secret-key
      - LOGLEVEL=debug
    volumes:
      # Persist rmfakecloud data (users, devices, documents) across container restarts
      # This directory can be committed to git for team-wide setup
      - ./fixtures/rmfakecloud_data:/data
    network_mode: "slirp4netns:port_handler=slirp4netns"

  ocr-minimal:
    build:
      context: ../docker/ocr-minimal
      dockerfile: Containerfile
    image: rock-paper-sync-ocr-minimal:latest
    container_name: rock-paper-sync-ocr-minimal
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
